name: Deploy Vampire Trade to GitHub Pages

on:
  push:
    branches:
      - main # Agar aapki branch ka naam 'master' hai toh yaha master likhein

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # Ye 'dist' folder generate karega

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite ka build output folder
          branch: gh-pages # Is branch par build files publish hongi
